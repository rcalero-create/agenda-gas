<script>

function extraerContactos(datos) {

    let contactos = []; // declaramos un vector

    for (let i = 1; i < datos.length; i++) {

        // Crearemos un objeto
        let contacto = {
            nombre: datos[i][0],
            apellidos: datos[i][1],
            correo: datos[i][2],
            telefono: datos[i][3],
            imagen: datos[i][4],
            fila: i + 1
        };
        // añadimos el objeto al vector
        contactos.push(contacto);
    }
    return contactos;

}

function extraerColumnas(datos) {

    let columnas = [];

    for (let i = 1; i < datos[0].length; i++) columnas.push(datos[0][i]);

    columnas.push('OPCIONES');

    return columnas;

}

function eliminarTabla() {

          let tabla = document.getElementById('tablaContactos');
          if (tabla) tabla.remove();

}

function crearTablaContactos() {

    // llamamos a limpiar para eliminar tabla y loader
    limpiar();

    //  Cridem a Google de manera segura
    google.script.run
        .withSuccessHandler(crearTablaContactosCorrectamente)
        .withFailureHandler(crearTablaContactosError)
        .obtenerDatos();
}

function crearTablaContactosCorrectamente(datos) {

            // extraer contactos y columnas
            let contactos = extraerContactos(datos);
            let columnas = extraerColumnas(datos);

            // crearemos la tabla
            tabla = document.createElement('table');
            tabla.id = 'tablaContactos';

            // crearemos el header y agregamos a tabla
            tabla.appendChild(crearHeaderTabla(columnas));

            // crearemos el body y agregamos a tabla
            tabla.appendChild(crearBodyTabla(contactos));


            // estilo de la tabla
            tabla.classList.add('table', 'table-striped', 'border', 'border-3', 'table-success', 'border-dark');

            // agregar a la web
            document.getElementById('divContactos').appendChild(tabla);

            // eliminaremos el loader
            eliminarLoader();

}
function crearTablaContactosError() {
          // Mostrar notificación de error
          crearNotificacionError('No se ha encontrado los datos', 'ERROR');
          // eliminaremos el loader
          eliminarLoader();

}

function crearHeaderTabla(columnas) {

    let tablaHeader = document.createElement('thead');
    tablaHeader.classList.add('table-dark'); // Afegim la classe dark a la capçalera
    
    // Header de la tabla (Fila 0)
    let primeraFila = document.createElement('tr');

    // agregamos columnas
    columnas.forEach(columna => {
        
        let celda = document.createElement('th'); // Canviat a 'th' perquè quedi com a capçalera real
        celda.textContent = columna;
        primeraFila.appendChild(celda);

    });

    // agregamos fila al header
    tablaHeader.appendChild(primeraFila); 

    return tablaHeader;

}

function crearBodyTabla(contactos) {

    // crear body de la tabla
    let tablaBody = document.createElement('tbody');

    contactos.forEach(contacto => {

        let fila = document.createElement('tr');

        // Agregamos las celdas
        fila.appendChild(crearCelda(contacto.nombre));
        fila.appendChild(crearCelda(contacto.apellidos));
        fila.appendChild(crearCelda(contacto.correo));
        fila.appendChild(crearCelda(contacto.telefono));
        fila.appendChild(crearCeldaImagen(contacto.imagen));
        fila.appendChild(crearCeldaBotones(contacto));


        // Agregamos la fila
        tablaBody.appendChild(fila);

    });

    return tablaBody;

}

function crearCelda(dato) {

    let celda = document.createElement('td');
    celda.textContent = dato;
    return celda;
}

function crearCeldaImagen(rutaImagen) {

    let celda = document.createElement('td');
    let imagen = document.createElement('img');
    imagen.classList.add('img-fluid','rounded');
    imagen.src = rutaImagen;
    celda.appendChild(imagen);

    return celda;
}

// Añadimos 'fila' como segundo parámetro
function crearCeldaBotones(contacto) {

    // Crear celda
    let celda = document.createElement('td');
    celda.classList.add('text-center');
    
    celda.appendChild(crearBotonInfoContacto(contacto));
    celda.appendChild(crearBotonEliminarContacto(contacto));
    celda.appendChild(crearBotonModificarContacto(contacto));
    
    // Devolvemos la celda con los dos botones dentro
    return celda;
}

</script>
