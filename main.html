<main>
    <!-- Formulario -->
    <div class="d-flex justify-content-center my-3">
        <form action="https://script.google.com/macros/s/AKfycbwsvIlkpYJMJ6NzDJRiVwsq_pVc2o2Zo87VjOC5UiVYM9KV5Yf7RB7tHz8l2HhckyhjHw/exec" method="post" id="formulario">
        
    
    <div class="mb-3">

      <label for="nombre" class="form label">Introduce el nombre del contacto</label>
      <input type="text" class="form-control" name="nombre" id="nombre">

    </div class="mb-3">

    <div>

      <label for="correo" class="form label">Introduce el correo del contacto</label>
      <input type="email" class="form-control" name="correo" id="correo">

    </div>

      <!-- Botones  -->
     <button type="button" class="btn btn-success m-3" onclick="crearTablaContactos();">Mostrar contactos</button>
     <button type="submit" class="btn btn-primary">Crear contacto</button>

    </form>

    </div>

    <!-- Tabla de contactos -->
    <div class="container col12 col-mg-6 mb-4 w-40 d-flex justify-content-center" id="divContactos"></div>

    <div>

      <!-- Notificaciones -->
      
      <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <!-- Toast -->
        <div id="notificacion" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">

          <div class="toast-header p-0">
            <div class="icono-notificacion"><i id="iconoNotificacion"></i></div>
            <strong class="me-auto" id="tituloNotificacion"></strong>
            <button type="button" class="btn-close m-2" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>

          <div class="toast-body" id="mensajeNotificacion"></div>

        </div>
      </div>

    </div>

</main>
