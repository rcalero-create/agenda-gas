<main>

  <!-- Botones SUPERIORES-->
  <div class="d-flex justify-content-center my-3">   
    <button type="button" class="btn btn-success m-2" onclick="crearTarjetasContactos();">Mostrar contactos</button>
    <button type="button" class="btn btn-success m-2" onclick="crearTablaContactos();">Mostrar contactos Tabla</button>
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary m-2" onclick="abrirModalCrearContacto()";>
      Crear contacto
    </button>
    <button type="button" class="btn btn-warning m-2" onclick="importarContactos()";>+ 5</button>
  </div>

  <!-- Tabla de contactos -->
  <div class="container col12 mb-4 w-40 d-flex justify-content-center" id="divContactos"></div>

  <div>

    <!-- Notificaciones -->

    <div class="div-notificacion position-fixed bottom-0 end-0 p-3">

      <div class="toast-container position-static" id="contenedorNotificacion">

        <!-- Aquí van las notificaciones -->
      </div>

      <!-- Toast -->
      <div id="notificacion" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive"
        aria-atomic="true">

        <div class="toast-header p-0">
          <div class="icono-notificacion"><i id="iconoNotificacion"></i></div>
          <strong class="me-auto" id="tituloNotificacion"></strong>
          <button type="button" class="btn-close m-2" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>

        <div class="toast-body" id="mensajeNotificacion"></div>

      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="crearContactoModal" tabindex="-1" aria-labelledby="tituloCrearContactoModal"
    aria-hidden="true">
    <div class="modal-lg modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="tituloModal">Nuevo contacto</h1>
        </div>

        <!-- Formulario modal -->
        <form onsubmit="insertarContacto(event)" method="dialog" id="formulario">
          <div class="modal-body">

            <!-- Nombre i apellidos -->
            <div class="row mb-3">

              <div class="col-4">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" name="nombre" id="nombre" pattern="[\D]*" title="El nombre no puede contener números" required>
              </div>

              <div class="col-8">
                <label for="apellidos" class="form-label">Apellidos</label>
                <input type="text" class="form-control" name="apellidos" id="apellidos" pattern="[\D]*" title="Los apellidos no puede contener números" required>
              </div>

            </div>

            <!-- Correo electrónico y teléfono -->
            <div class="input-group col-5 mb-3">
              <span class="input-group-text"><i class="bi bi-envelope-at me-4"></i>Correo</span>
              <input type="email" class="form-control" name="correo" id="correo" required>
              <span class="input-group-text"><i class="bi bi-telephone"></i>Teléfono</span>
              <input type="tel" class="form-control" name="telefono" id="telefono"  pattern="[\d]{9,11}" title="Introduce números mínimo 9 y máximo 11" required>
            </div>



            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button id="botonCrearModificar" type="submit" class="btn btn-success">Crear contacto</button>
            </div>
        </form>

      </div>
    </div>
  </div>

</main>
