<main>

  <div class="d-flex justify-content-center my-3">
    <button type="button" class="btn btn-success m-2" onclick="crearTarjetasContactos();">Mostrar contactos</button>
    <button type="button" class="btn btn-success m-2" onclick="crearTablaContactos();">Mostrar contactos Tabla</button>
    <button type="button" class="btn btn-primary m-2" onclick="abrirModalCrearContacto();">Crear contacto</button>
    <button type="button" class="btn btn-warning m-2" onclick="importarContactos();">+ 5</button>
  </div>

  <div class="container col-12 mb-4 d-flex justify-content-center" id="divContactos"></div>

  <div class="div-notificacion position-fixed bottom-0 end-0 p-3">
    <div class="toast-container position-static" id="contenedorNotificaciones">
      </div>
  </div> <div class="modal fade" id="crearContactoModal" tabindex="-1" aria-labelledby="tituloModal" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModal">Crear contacto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="formulario">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="nombre" name="nombre" required>
            </div>
            <div class="mb-3">
              <label for="apellidos" class="form-label">Apellidos</label>
              <input type="text" class="form-control" id="apellidos" name="apellidos" required>
            </div>
            <div class="mb-3">
              <label for="correo" class="form-label">Correo</label>
              <input type="email" class="form-control" id="correo" name="correo" required>
            </div>
            <div class="mb-3">
              <label for="telefono" class="form-label">Teléfono</label>
              <input type="tel" class="form-control" id="telefono" name="telefono" required>
            </div>
            <div class="modal-footer px-0 pb-0">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" id="botonCrearModificar" class="btn btn-success">Crear contacto</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

</main>
