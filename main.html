<main>

  <!-- Botones SUPERIORES -->
  <div class="d-flex justify-content-center my-3">
    <button type="button" class="btn btn-success m-2" onclick="crearTablaContactos();">Mostrar contactos</button>

    <button type="button" class="btn btn-primary m-2" onclick="abrirModalCrearContacto();">
      Crear contacto
    </button>
  </div>

  <!-- Contenedor de contactos -->
  <div class="container col-12 col-lg-6 mb-4 w-40 d-flex justify-content-center" id="divContactos"></div>

  <!-- Contenedor de notificaciones -->
  <div>
    <div class="div-notificaciones position-fixed bottom-0 end-0 p-3">
      <div class="toast-container position-static" id="contenedorNotificaciones">
        </div>
    </div>
  </div>

  <!-- Modal para crear contacto -->
  <div class="modal fade" id="crearContactoModal" tabindex="-1" aria-labelledby="tituloModal" aria-hidden="true">
    <div class="modal-dialog modal-lg"> <div class="modal-content">
        
        <!-- Encabezado del modal -->
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="tituloModal">Nuevo contacto</h1>
        </div>

        <!-- Cuerpo del modal -->
        <form onsubmit="insertarContacto(event)" id="formulario">
          <div class="modal-body">

            <div class="row mb-3">
              <div class="col-4">
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" class="form-control" name="nombre" id="nombre" pattern="[\D]*" title="El nombre no puede contener números" required>
              </div>

              <div class="col-8">
                <label for="apellidos" class="form-label">Apellidos</label>
                <input type="text" class="form-control" name="apellidos" id="apellidos" pattern="[\D]*" title="Los apellidos no pueden contener números" required>
              </div>
            </div>

            <div class="input-group mb-3">
              <span class="input-group-text"><i class="bi bi-envelope-at me-2"></i>Correo</span>
              <input type="email" class="form-control" name="correo" id="correo" required>
              
              <span class="input-group-text"><i class="bi bi-telephone"></i>Teléfono</span>
              <input type="tel" class="form-control" name="telefono" id="telefono" pattern="[\d]{9,11}" title="Introduce números: mínimo 9 y máximo 11" placeholder="666666666" required>
            </div>

          </div>
          <!-- Pie del modal -->
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button id="botonCrearModificar" type="submit" class="btn btn-success">Crear contacto</button>
          </div>
        </form>

      </div>
    </div>
  </div>

</main>
