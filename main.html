<main>

  <!-- botones superiores -->
  <div class="d-flex justify-content-center my-3">

    <button type="button" class="btn btn-success m-2" onclick="crearTablaContactos();">

      <i class="bi bi-person-plus"></i>
    </button>
    <button type="button" class="btn btn-warning m-2" onclick="importarContactos();">+ 5</button>
    <div class="dropdown">
  <button class="btn btn-secondary dropdown-toggle" type="button" id="desplegableEstilos" data-bs-toggle="dropdown" aria-expanded="false">
    <i class="bi bi-gear fs-5"></i>
  </button>
  <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="desplegableEstilos">
    <li><a class="dropdown-item" id="tarjetasEstiloTabla" >Estilo tabla</a></li>
    <li><a class="dropdown-item" id="tarjetasEstiloFila" >Estilo fila</a></li>
    <li><a class="dropdown-item" id="tarjetasEstilo1" >Estilo tarjeta 1</a></li>
    <li><a class="dropdown-item" id="tarjetasEstilo2" >Estilo tarjeta 2</a></li>
    <li><a class="dropdown-item" id="tarjetasEstilo3" >Estilo tarjeta 3</a></li>

    <li><a class="dropdown-item" id="tarjetasEstilo5" >Estilo tarjeta 5</a></li>
  </ul>
</div>
  </div>

  <!-- Contactos -->
  <div class="container col-12 mb-4 d-flex justify-content-center" id="divContactos"></div>

  <!-- Notificaciones -->
  <div class="div-notificacion position-fixed bottom-0 end-0 p-3">
    <div class="toast-container position-static" id="contenedorNotificaciones">
      <!-- Aquí van las notificaciones -->
    </div>
  </div>

  <!-- Modal para crear y modificar contacto -->
  <div class="modal fade" id="crearContactoModal" tabindex="-1" aria-labelledby="tituloModal" aria-hidden="true">
    <div class="modal-lg modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModal">Nuevo contacto</h5>
        </div>

        <!-- Formulario -->
        <form onsubmit="insertarContacto()" method="dialog" id="formulario">
          <div class="modal-body">

            <div class="mb-3 d-flex justify-content-center align-items-center flex-wrap">

              <!-- Parte izquierda -->
              <div class="div-datos-form">
                <!-- Nombre -->
                <div class="mb-2">
                  <label for="nombre" class="form-label">Nombre</label>
                  <input type="text" class="form-control" id="nombre" name="nombre" pattern="[\D]*"
                    title="Solo se permiten letras" required>
                </div>
                <!-- Apellidos -->
                <div class="mb-2">
                  <label for="apellidos" class="form-label">Apellidos</label>
                  <input type="text" class="form-control" id="apellidos" name="apellidos" pattern="[\D]*"
                    title="Solo se permiten letras" required>
                </div>
                <!-- Correo -->
                <div class="input-group mb-2">
                  <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                  <input type="email" class="form-control" id="correo" name="correo" required>
                </div>
                <!-- Teléfono -->
                <div class=" input-group mb-2">
                  <span class="input-group-text"><i class="bi bi-phone-fill"></i></span>
                  <input type="tel" class="form-control" id="telefono" name="telefono" required>
                </div>
                <!-- Archivo -->
                <div class="mb-2">
                  <label for="imagen" class="form-label">Selecciona una imagen para el contacto</label>
                  <input type="file" accept="image/*" class="form-control" id="imagen" name="imagen">
                </div>
              </div>


              <!-- Parte derecha -->
              <div class="div-img-form">
                <i class="icono-form bi bi-question-circle-fill" data-bs-toggle="popover"
                  data-bs-content="Se recomienda una imagen cuadrada para una mejor visualización. De lo contrario, la imagen puede verse recortada. Recomendada 320x320px"
                  data-bs-trigger="hover"></i>
                <img class="img-fluid img-form" id="imgForm" alt="Imagen de contacto">
                <div class="caja-icono-form container-fluid" id="cajaIconoForm">
                  <i class="icono-img-form bi bi-cloud-plus"></i>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" id="botonCrearModificar" class="btn btn-success">Crear contacto</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal info contacto -->
  <div class="modal fade" id="infoContactoModal" tabindex="-1" aria-labelledby="" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-body">

          <div class="mb-3 d-flex justify-content-center align-items-center flex-column">

            <!-- Parte superior -->
            <div class="m-3">
              <h3 class="text-uppercase text-center fw-bold mb-2" id="nombreInfoContacto"></h3>
              <div class="d-flex align-items-center">
                <i class="bi bi-envelope-fill me-2"></i>
                <h5 class="me-4" id="correoInfoContacto"></h5>
                <i id="copiarCorreo" class="bi bi-clipboard boton-copiar" class="btn btn-secondary"
                  data-bs-toggle="tooltip" data-bs-placement="right" data-bs-title="Copiar correo"></i>
              </div>
              <div class="d-flex align-items-center">
                <i class="bi bi-phone-fill me-2"></i>
                <h5 class="me-4" id="telefonoInfoContacto"></h5>
                <i id="copiarTelefono" class="bi bi-clipboard boton-copiar" data-bs-toggle="tooltip"
                  data-bs-placement="right" data-bs-title="Copiar teléfono"></i>
              </div>
            </div>

            <!-- Parte inferior -->
            <div class="m-3">
              <img id="imgInfoContacto" class="border border-4 border-dark rounded"
                alt="Vista previa de la imagen de contacto">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        </div>

      </div>
    </div>
  </div>


</main>
