<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>

:root{
  --color-azul-claro:#7FB3D5;
  --color-azul-oscuro:#2874A6;
  --color-verde-claro:#D4EFDF;
  --color-verde-oscuro:#239B56;
  --color-rojo-claro:#EC7063;
  --color-rojo-oscuro:#C0392B;
  --color-amarillo-claro:#F9E79F;
  --color-amarillo-oscuro:#D4AC0D;
  --color-gris-claro:#E5E7E9;
  --color-gris-oscuro:#515A5A;
}
header {
    background-color: #eee;
}

.icono-footer {
  font-size: 1.5rem;
  padding: 1rem;
  transition: all .2s ease-in-out;
  transform: scale(1);
}

.icono-footer:hover {
  color: var(--color-azul-claro);
  transform: scale(1.2);
}

.div-notificacion{
  z-index: 9999 !important;
}

.icono-notificacion{
  font-size: 1.5rem;
  padding: .5rem;
}

body{
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}


/* LOADER PUNTOS */

.lds-ellipsis,
.lds-ellipsis div {
  box-sizing: border-box;
}
.lds-ellipsis {
  display: inline-block;
  position: relative;
  width: 80px;
  height: 80px;
}
.lds-ellipsis div {
  position: absolute;
  top: 33.33333px;
  width: 13.33333px;
  height: 13.33333px;
  border-radius: 50%;
  background: var(--color-azul-oscuro);
  animation-timing-function: cubic-bezier(0, 1, 1, 0);
}
.lds-ellipsis div:nth-child(1) {
  left: 8px;
  animation: lds-ellipsis1 0.6s infinite;
}
.lds-ellipsis div:nth-child(2) {
  left: 8px;
  animation: lds-ellipsis2 0.6s infinite;
}
.lds-ellipsis div:nth-child(3) {
  left: 32px;
  animation: lds-ellipsis2 0.6s infinite;
}
.lds-ellipsis div:nth-child(4) {
  left: 56px;
  animation: lds-ellipsis3 0.6s infinite;
}
@keyframes lds-ellipsis1 {
  0% {
    transform: scale(0);
  }
  100% {
    transform: scale(1);
  }
}
@keyframes lds-ellipsis3 {
  0% {
    transform: scale(1);
  }
  100% {
    transform: scale(0);
  }
}
@keyframes lds-ellipsis2 {
  0% {
    transform: translate(0, 0);
  }
  100% {
    transform: translate(24px, 0);
  }
}

.subir-arriba{
  background-color: var(--color-gris-claro);
  position: fixed;
  transition: all .4s ease-in-out;
  transform: scale(0);
  bottom: 1%;
  right: 1%;
  z-index: 10;
}

.img-contacto{
  object-fit: cover;
  width: 12rem;
  height: 12rem;
}

.img-form{
  object-fit: cover;
  width: 18rem;
  height: 18rem;
  border: 1px solid black;
  border-radius: .5rem;
}

.img-tabla{
  object-fit: cover;
  height: 4rem;
}

/* LOADER ANILLO */

.lds-ring,
.lds-ring div {
  box-sizing: border-box;
}
.lds-ring {
  display: inline-block;
  position: relative;
  width: 80px;
  height: 80px;
}
.lds-ring div {
  box-sizing: border-box;
  display: block;
  position: absolute;
  width: 64px;
  height: 64px;
  margin: 8px;
  border: 8px solid var(--color-azul-oscuro);
  border-radius: 50%;
  animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  border-color: var(--color-azul-oscuro) transparent transparent transparent;
}
.lds-ring div:nth-child(1) {
  animation-delay: -0.45s;
}
.lds-ring div:nth-child(2) {
  animation-delay: -0.3s;
}
.lds-ring div:nth-child(3) {
  animation-delay: -0.15s;
}
@keyframes lds-ring {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

/* Forzar que cuando el Toast tenga la clase .show sea completamente opaco y visible */
.toast.show {
  display: flex !important;
  opacity: 1 !important;
  transition: opacity 0.15s linear;
}

/* Estilo opcional para que el texto de la cabecera del Toast sea legible sobre fondos oscuros */
.toast-header {
  background-color: rgba(255, 255, 255, 0.85) !important;
  color: #212529 !important;
  border-bottom: 1px solid rgba(0,0,0,.05);
}

</style>
