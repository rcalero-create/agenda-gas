<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<link href="https://fonts.cdnfonts.com/css/janda-manatee-bubble" rel="stylesheet">
                

<style>

:root{
  --color-azul-claro:#7FB3D5;
  --color-azul-oscuro:#2874A6;
  --color-verde-claro:#D4EFDF;
  --color-verde-oscuro:#239B56;
  --color-rojo-claro:#EC7063;
  --color-rojo-oscuro:#C0392B;
  --color-amarillo-claro:#F9E79F;
  --color-amarillo-oscuro:#D4AC0D;
  --color-gris-claro:#E5E7E9;
  --color-gris-oscuro:#515A5A;
}
header {
    background-color: #eee;
    text-align: center;
}

.icono-footer {
  font-size: 1.5rem;
  padding: 1rem;
  transition: all .2s ease-in-out;
  transform: scale(1);
}

.icono-footer:hover {
  color: var(--color-azul-claro);
  transform: scale(1.2);
}

.icono-form{
  position:absolute;
  color: var(--color-amarillo-claro);
  font-size: 1.5rem;
  right: 0rem;
  top: 0rem;
  z-index: 3;
}

.div-notificacion{
  z-index: 9999 !important;
}

.icono-notificacion{
  font-size: 1.5rem;
  padding: .5rem;
}

body{
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  font-family: 'Janda Manatee Solid', sans-serif;
}


/* LOADER PUNTOS */

.lds-ellipsis,
.lds-ellipsis div {
  box-sizing: border-box;
}
.lds-ellipsis {
  display: inline-block;
  position: relative;
  width: 80px;
  height: 80px;
}
.lds-ellipsis div {
  position: absolute;
  top: 33.33333px;
  width: 13.33333px;
  height: 13.33333px;
  border-radius: 50%;
  background: var(--color-azul-oscuro);
  animation-timing-function: cubic-bezier(0, 1, 1, 0);
}
.lds-ellipsis div:nth-child(1) {
  left: 8px;
  animation: lds-ellipsis1 0.6s infinite;
}
.lds-ellipsis div:nth-child(2) {
  left: 8px;
  animation: lds-ellipsis2 0.6s infinite;
}
.lds-ellipsis div:nth-child(3) {
  left: 32px;
  animation: lds-ellipsis2 0.6s infinite;
}
.lds-ellipsis div:nth-child(4) {
  left: 56px;
  animation: lds-ellipsis3 0.6s infinite;
}
@keyframes lds-ellipsis1 {
  0% {
    transform: scale(0);
  }
  100% {
    transform: scale(1);
  }
}
@keyframes lds-ellipsis3 {
  0% {
    transform: scale(1);
  }
  100% {
    transform: scale(0);
  }
}
@keyframes lds-ellipsis2 {
  0% {
    transform: translate(0, 0);
  }
  100% {
    transform: translate(24px, 0);
  }
}

.subir-arriba{
  background-color: var(--color-gris-claro);
  position: fixed;
  transition: all .4s ease-in-out;
  transform: scale(0);
  bottom: 1%;
  right: 1%;
  z-index: 10;
}

.img-contacto{
  object-fit: cover;
  width: 12rem;
  height: 12rem;
}

.img-tabla{
  object-fit: cover;
  height: 4rem;
}

/* CLASES FORMULARIO */

.div-datos-form{
  height: 20rem;
  width: 20rem;
  margin: 1rem;
}

.div-img-form{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 20rem;
  width: 20rem;
}

.img-form{
  position: absolute;
  object-fit: cover;
  width: 18rem;
  height: 18rem;
  border: 1px solid black;
  border-radius: .5rem;
  z-index: 2;
}

.caja-icono-form{
  position: absolute;
  border: .4rem dashed green;
  height: 18rem;
  display: none;
  justify-content: center;
  align-items: center;
  animation: animacion-drag-drop 3s infinite;
  z-index: 1;
}
.icono-img-form{
  font-size: 10rem;
  color: green;
}
/* animación */
@keyframes animacion-drag-drop {
  0% {font-size: 10rem;}
  50% {font-size: 9rem;}
  100% {font-size: 10rem;}
}

.boton-copiar{
  margin-left: auto;
  font-size: 1.5rem;
  
}

.boton-copiar:hover{
  color: var(--color-verde-oscuro);
  transform: scale(1.2);
}

/* ESTILOS ADICIONALES */

.caja-contacto, .caja-contacto img {
  position:relative;
  border: .3rem solid var(--color-gris-oscuro);
  border-radius: .3rem;
  background-color: var(--color-gris-oscuro);  
}

.datos-contacto {
  position:absolute;
  padding: .5rem;
  background:black;
  width: 100%;
  height: 6rem;
  bottom:0;
}

.datos-contacto h3 {
  color:white;
  font-size: 1.5rem;
}

.datos-contacto span {
  position:absolute;
  bottom:0;
  right:0;
  margin: .4rem;
}

.caja-contacto img {
  width: 16rem;
  height: 16rem;
  object-fit: cover;
  z-index: 2;
  transition: all .5s;
}

.caja-contacto:hover img {
  transform: translateY(-6rem);
}

.plantilla-loader {
  width: 16rem;
  height: 16rem;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  border: 1px solid var(--color-rojo-oscuro);
  border-radius: .5rem;
  blackground-color:white;
}

.boton-caja {
  transform: scale(1);
  transition: all .4s;
}

.boton-caja:hover {
  transform: translateY(10%);
}


/* ESTILO 1 */

.caja-estilo-1 {
  border: .3rem solid var(--color-azul-oscuro);
}

/* ESTILO 2 */
.caja-estilo-2 .caja-contacto{
overflow: hidden;
}

/* ESTILO 3  */
.caja-estilo-3 .caja-contacto{
overflow: hidden;
}

.caja-estilo-3 .datos-contacto{
  height: 100%;
  width: 50%;
  transform: scaleX(0);
  transform-origin: 0 0;
  transition: all .5s;
}

.caja-estilo-3 .caja-contacto:hover .datos-contacto{
  transform: scaleX(1);
  z-index: 2; 
}
.caja-estilo-3 .caja-contacto:hover img{
  transform: scaleX(30%) scale(1.1);
  filter: grayscale(100%);
}

/* ESTILO 4 */
.caja-estilo-4 .caja-contacto img{
z-index: 2;
transition: all .4s;
}

.caja-estilo-4 .datos-contacto{
  height: 100%;
  width: 100%;
  border-radius: .3rem;
  border: .3rem solid (--color-gris-oscuro);
  background: linear-gradient(180deg, black, 0%, var(--color-rojo-oscuro) 100%);
}
.caja-estilo-4 .caja-contacto:hover .datos-contacto img{
  transform: scale(0.6);
}
.caja-estilo-4 .caja-contacto:hover .datos-contacto{
  transform: scale(1.3);
}

/* ESTILO 5 */
.caja-estilo-5 .caja-contacto{
overflow: hidden; 
}
.caja.estilo-5 .caja-contacto img{
  transition: all .5s;
}
.caja-estilo-5 .caja-contacto:hover img{
  transform: scale(1.2);
  filter: grayscale(100%);
}
.caja-estilo-5 .datos-contacto{
  height: 100%;
  width: 100%;
  background: none;
  z-index: 2;
}
.caja-estilo-5 .btn{
  transform: scale(0);
}
.caja-estilo-5 h3{
  transform: scale(0);
  text-shadow: .1rem .1rem black;
}
.caja-estilo-5 .caja-contacto:hover .btn,
.caja-estilo-5 .caja-contacto:hover h3{
  transform: scale(1);
}
/* LOADER ANILLO */

.lds-ring,
.lds-ring div {
  box-sizing: border-box;
}
.lds-ring {
  display: inline-block;
  position: relative;
  width: 80px;
  height: 80px;
}
.lds-ring div {
  box-sizing: border-box;
  display: block;
  position: absolute;
  width: 64px;
  height: 64px;
  margin: 8px;
  border: 8px solid var(--color-azul-oscuro);
  border-radius: 50%;
  animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  border-color: var(--color-azul-oscuro) transparent transparent transparent;
}
.lds-ring div:nth-child(1) {
  animation-delay: -0.45s;
}
.lds-ring div:nth-child(2) {
  animation-delay: -0.3s;
}
.lds-ring div:nth-child(3) {
  animation-delay: -0.15s;
}
@keyframes lds-ring {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

/* Forzar que cuando el Toast tenga la clase .show sea completamente opaco y visible */
.toast.show {
  display: flex !important;
  opacity: 1 !important;
  transition: opacity 0.15s linear;
}

/* Estilo opcional para que el texto de la cabecera del Toast sea legible sobre fondos oscuros */
.toast-header {
  background-color: rgba(255, 255, 255, 0.85) !important;
  color: #212529 !important;
  border-bottom: 1px solid rgba(0,0,0,.05);
}

</style>
